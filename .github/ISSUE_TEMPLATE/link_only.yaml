name: Add Opportunity (Just Paste Link)
description: Just paste the link - AI will extract all the details automatically!
title: "Add: "
labels: ["new_opportunity", "auto_extract"]
body:
  - type: markdown
    attributes:
      value: |
        ## Just Paste the Link!

        AI will automatically extract:
        - Organization name
        - Opportunity title
        - Location
        - Type (Internship / Program / Research / Scholarship / etc.)
        - And more!

  - type: input
    id: url
    attributes:
      label: Link to Opportunity
      description: Paste the URL to the opportunity posting
      placeholder: https://careers.google.com/jobs/...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Any additional context? (Optional)
      description: Add any notes if the link might be confusing
      placeholder: This is a summer fellowship for first-gen students...
    validations:
      required: false
