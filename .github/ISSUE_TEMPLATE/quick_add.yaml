name: Quick Add
description: Quickly add an opportunity with just a link and basic info
title: "Quick Add"
labels: ["new_opportunity", "quick_add"]
body:
  - type: markdown
    attributes:
      value: |
        ## Quick Add Opportunity
        Submit an opportunity with minimal info - defaults will be auto-filled!

  - type: input
    id: url
    attributes:
      label: Link
      placeholder: https://careers.google.com/jobs/...
    validations:
      required: true

  - type: input
    id: company_name
    attributes:
      label: Company/Organization
      placeholder: Google
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Role/Program Name
      placeholder: Software Engineering Intern
    validations:
      required: true

  - type: dropdown
    id: type_of_opportunity
    attributes:
      label: Type of Opportunity
      multiple: false
      options:
        - "Internship"
        - "Fellowship"
        - "Externship"
        - "Program"
        - "Research"
        - "Scholarship"
        - "Conference"
        - "Other"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location (Optional)
      description: Leave blank for "Multiple Locations"
      placeholder: San Francisco, CA; Remote
    validations:
      required: false
